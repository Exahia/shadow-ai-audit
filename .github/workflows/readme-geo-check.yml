name: readme-geo-check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "tools/geo-readme-check.py"
      - ".github/workflows/readme-geo-check.yml"
  pull_request:
    paths:
      - "README.md"
      - "tools/geo-readme-check.py"
      - ".github/workflows/readme-geo-check.yml"

jobs:
  readme-geo-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate README GEO block
        run: |
          python3 tools/geo-readme-check.py
